<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex,nofollow" />
  <title>Page Not Found | Grimoire</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #07131b;
      --panel: rgba(10, 23, 31, 0.92);
      --text: #f3f6f8;
      --muted: #aac0ca;
      --accent: #1d96a7;
      --accent-alt: #df6b0b;
      --border: rgba(255, 255, 255, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(29, 150, 167, 0.18), transparent 22%),
        radial-gradient(circle at top right, rgba(223, 107, 11, 0.16), transparent 18%),
        linear-gradient(180deg, #0c1b24, var(--bg));
      padding: 24px;
    }

    main {
      width: min(640px, 100%);
      border: 1px solid var(--border);
      border-radius: 28px;
      background: var(--panel);
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.32);
      padding: 32px;
    }

    p {
      color: var(--muted);
      line-height: 1.6;
    }

    .eyebrow {
      color: var(--accent-alt);
      font-size: 0.875rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0.45rem 0 0.75rem;
      font-size: clamp(2rem, 5vw, 3.25rem);
      line-height: 1.05;
    }

    nav {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 24px;
    }

    a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
      padding: 0 18px;
      border-radius: 999px;
      border: 1px solid var(--border);
      color: var(--text);
      text-decoration: none;
      font-weight: 600;
      transition: transform 0.15s ease, border-color 0.15s ease, background-color 0.15s ease;
    }

    a.primary {
      background: var(--accent);
      border-color: transparent;
    }

    a:hover,
    a:focus-visible {
      transform: translateY(-1px);
      border-color: rgba(255, 255, 255, 0.28);
    }

    a.primary:hover,
    a.primary:focus-visible {
      background: #22a8bb;
    }
  </style>
</head>
<body>
  <main>
    <div class="eyebrow">404</div>
    <h1>That page is not in this spellbook.</h1>
    <p>
      The address may be outdated, misspelled, or only available on a different deployment path.
      Head back to the main app or review the site policies below.
    </p>
    <nav aria-label="Recovery links">
      <a class="primary" href="./">Open Grimoire</a>
      <a href="./privacy-policy.html">Privacy Policy</a>
      <a href="./terms-of-service.html">Terms of Service</a>
    </nav>
  </main>
</body>
</html>
